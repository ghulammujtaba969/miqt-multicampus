<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Progress Report - Minhaj Institute</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Times New Roman', 'Georgia', serif;
    font-size: 12px;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px;
  }

  .card {
    width: 560px;
    background: #fff;
    border: 2px solid #444;
    padding: 22px 24px 28px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 4px;
  }

  .header img {
    width: 66px;
    height: 66px;
    object-fit: contain;
  }

  .header-text .inst-name {
    font-size: 21px;
    font-weight: bold;
    line-height: 1.3;
  }

  .header-text .inst-sub {
    font-size: 13px;
    font-weight: bold;
  }

  .report-title {
    text-align: center;
    font-size: 13px;
    margin-top: 14px;
    line-height: 1.7;
  }

  /* Student info fields */
  .fields {
    margin-top: 16px;
  }

  /* Row 1: Name + S/O */
  .field-row {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-bottom: 8px;
    width: 100%;
  }

  .field-label {
    font-size: 12px;
    white-space: nowrap;
    font-weight: 500;
    flex-shrink: 0;
  }

  .field-line {
    border-bottom: 1px solid #000;
    height: 16px;
    flex: 1;
    min-width: 0;
  }

  /* Row 2: Date of Admission | House | School Class - all inside card */
  .field-row-3 {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 8px;
    width: 100%;
  }

  .field-group {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .field-group .field-line {
    flex: 1;
    min-width: 0;
  }

  /* Urdu section title */
  .urdu-title {
    text-align: center;
    font-size: 16px;
    font-family: 'Noto Nastaliq Urdu', 'Arial Unicode MS', serif;
    direction: rtl;
    margin-top: 14px;
    margin-bottom: 6px;
    text-decoration: underline;
    font-weight: bold;
  }

  /* Progress table */
  .progress-table {
    width: 100%;
    border-collapse: collapse;
    direction: rtl;
    font-size: 11px;
    margin-bottom: 20px;
  }

  .progress-table th,
  .progress-table td {
    border: 1px solid #000;
    padding: 5px 4px;
    text-align: center;
    font-family: 'Noto Nastaliq Urdu', 'Arial Unicode MS', serif;
    font-size: 11px;
    direction: rtl;
    vertical-align: middle;
  }

  .progress-table th {
    font-weight: bold;
    line-height: 1.5;
    background: #fff;
  }

  .progress-table td {
    height: 28px;
  }

  /* Bottom: house incharge + contact */
  .bottom-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    direction: rtl;
    margin-bottom: 24px;
    gap: 10px;
  }

  .bottom-group {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .bottom-label {
    font-size: 12px;
    white-space: nowrap;
    font-family: 'Noto Nastaliq Urdu', 'Arial Unicode MS', serif;
    direction: rtl;
    flex-shrink: 0;
  }

  .bottom-line {
    border-bottom: 1px solid #000;
    height: 16px;
    flex: 1;
    min-width: 0;
  }

  /* Signature section */
  .signature-section {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
    padding: 0 10px;
  }

  .sig-block {
    text-align: center;
  }

  .sig-line {
    border-top: 1px solid #000;
    width: 160px;
    margin-bottom: 5px;
  }

  .sig-label {
    font-size: 12px;
  }
</style>
</head>
